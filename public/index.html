<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Forced A Bot</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --paper: #ffffff;
      --text: #000000;
      --text-light: #000000;
      --border: #000000;
      --accent: #000000;
    }
    body {
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }
    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header { text-align: center; margin-bottom: 2.5rem; padding: 1rem 0; }
    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .tagline {
      color: var(--text);
      font-size: 0.95rem;
      font-style: italic;
      opacity: 0.7;
    }

    /* Input Section */
    .input-section {
      background: var(--paper);
      border: 2px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .input-row {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border: 2px solid var(--text);
    }
    .input-row label {
      background: var(--text);
      color: var(--paper);
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"] {
      flex: 1;
      padding: 1rem 1.25rem;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      background: var(--paper);
      outline: none;
    }
    input[type="text"]::placeholder { color: var(--text-light); }

    button {
      width: 100%;
      padding: 1.1rem;
      background: var(--accent);
      color: var(--paper);
      border: 2px solid var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover {
      background: var(--text);
      color: var(--paper);
    }
    button:active { transform: translateY(0); }
    button:disabled {
      background: var(--paper);
      color: var(--text-light);
      border-color: var(--text);
      cursor: not-allowed;
    }

    .error {
      margin-top: 1rem;
      padding: 1rem;
      background: #ffeeee;
      border-left: 4px solid var(--accent);
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 700;
      display: none;
    }
    .error.visible { display: block; }

    /* Result - Play Script Format */
    .result {
      margin-top: 2rem;
      display: none;
      background: var(--paper);
      border: 2px solid var(--text);
    }
    .result.visible { display: block; }

    .result-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 2px solid var(--border);
      background: var(--paper);
    }
    .result-header p {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-light);
      font-style: italic;
    }

    /* Script Body - Industry Standard Formatting */
    .result-body {
      padding: 2.5rem 3rem;
      font-size: 1rem;
      line-height: 1.6;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      background: var(--paper);
      min-height: 400px;
    }

    .result-body .scene-heading {
      font-weight: bold;
      text-transform: uppercase;
      margin: 1.5rem 0 1rem 0;
      text-align: left;
      font-size: 0.95rem;
    }
    .result-body .scene-heading:first-child {
      margin-top: 0;
    }

    .result-body .action {
      margin: 1rem 0;
      text-align: left;
    }

    .result-body .character {
      text-align: center;
      margin: 1.5rem 0 0.25rem 0;
      font-weight: bold;
      text-transform: uppercase;
      display: block;
      font-size: 0.95rem;
    }

    .result-body .parenthetical {
      text-align: center;
      margin: 0 20%;
      font-style: italic;
      font-size: 0.9rem;
    }

    .result-body .dialogue {
      margin: 0 15% 0.75rem 15%;
      text-align: left;
    }

    /* Footer in output */
    .result-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-light);
      font-style: italic;
    }

    /* Action Buttons */
    .result-actions {
      display: flex;
      border-top: 2px solid var(--text);
    }
    .result-actions button {
      width: auto;
      flex: 1;
      background: var(--paper);
      color: var(--text);
      border: none;
      border-right: 1px solid var(--border);
      padding: 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-actions button:last-child { border-right: none; }
    .result-actions button:hover {
      background: var(--paper);
    }

    /* Page Footer */
    .page-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .page-footer a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .page-footer a:hover {
      border-bottom-color: var(--text);
    }

    @media (max-width: 600px) {
      .result-body { padding: 1.5rem 1.25rem; }
      .result-body .dialogue { margin: 0 10% 0.75rem 10%; }
      h1 { font-size: 1.75rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>I Forced A Bot</h1>
      <p class="tagline">1000 hours of X → bot writes a script</p>
    </div>

    <div class="input-section">
      <div class="input-row">
        <label>1000 hours of</label>
        <input type="text" id="content" placeholder="Olive Garden commercials, 90s sitcoms...">
      </div>
      <button id="generateBtn">Generate Script</button>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-header">
        <p id="memeIntroText"></p>
      </div>
      <div class="result-body" id="playScript"></div>
      <div class="result-footer" id="resultFooter">
        Made by Tianyu Fang and inspired by Keaton Patti
      </div>
      <div class="result-actions">
        <button id="copyBtn">Copy Text</button>
        <button id="downloadBtn">Save as Image</button>
        <button id="newBtn">New Script</button>
      </div>
    </div>

    <div class="page-footer">
      <p>A homage to <a href="https://twitter.com/keatonpatti" target="_blank">Keaton Patti</a>'s "I forced a bot" meme format</p>
    </div>
  </div>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const contentInput = document.getElementById('content');
    const resultDiv = document.getElementById('result');
    const memeIntroText = document.getElementById('memeIntroText');
    const playScript = document.getElementById('playScript');
    const errorDiv = document.getElementById('error');

    generateBtn.addEventListener('click', generatePlay);
    copyBtn.addEventListener('click', copyToClipboard);
    downloadBtn.addEventListener('click', downloadJPEG);
    newBtn.addEventListener('click', resetForm);

    async function generatePlay() {
      const content = contentInput.value.trim();
      if (!content) {
        showError('Enter what the bot watched');
        return;
      }

      hideError();
      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating...';

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || 'API request failed');
        }

        const data = await response.json();
        const result = data.choices?.[0]?.message?.content?.trim();

        if (!result) {
          throw new Error('No response from AI');
        }

        let json;
        try {
          const startIdx = result.indexOf('{');
          const endIdx = result.lastIndexOf('}');
          if (startIdx === -1 || endIdx === -1) throw new Error('No JSON found');
          let jsonStr = result.substring(startIdx, endIdx + 1)
            .replace(/[\u2018\u2019]/g, "'")  // Fix curly single quotes
            .replace(/[\u201C\u201D]/g, '"');   // Fix curly double quotes
          // Sanitize curly quotes that break JSON
          jsonStr = jsonStr.replace(/[""]/g, '"').replace(/['']/g, "'");
          json = JSON.parse(jsonStr);
        } catch (e) {
          // Fallback: display raw output
          const lines = result.split('\n').filter(l => l.trim());
          memeIntroText.textContent = lines[0] || '';
          playScript.innerHTML = `<div class="action">${lines.slice(1).join('<br>')}</div>`;
          resultDiv.classList.add('visible');
          generateBtn.disabled = false;
          generateBtn.textContent = 'Generate Script';
          return;
        }

        memeIntroText.textContent = json.intro || '';
        playScript.innerHTML = renderFromJson(json.scenes || []);
        resultDiv.classList.add('visible');

      } catch (err) {
        showError(err.message || 'Something went wrong');
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate Script';
      }
    }

    function copyToClipboard() {
      const footerText = document.getElementById('resultFooter').textContent;
      const text = `${memeIntroText.textContent}\n\n${playScript.textContent}\n\n${footerText}`;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Text', 2000);
      });
    }

    async function downloadJPEG() {
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Saving...';
      try {
        const canvas = await html2canvas(resultDiv, { backgroundColor: '#ffffff', scale: 2 });
        const link = document.createElement('a');
        link.download = 'bot-meme.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
        downloadBtn.textContent = 'Saved!';
        setTimeout(() => downloadBtn.textContent = 'Save as Image', 2000);
      } catch (err) {
        showError('Failed to generate image');
      } finally {
        downloadBtn.disabled = false;
      }
    }

    function resetForm() {
      resultDiv.classList.remove('visible');
      contentInput.value = '';
      contentInput.focus();
    }

    function renderFromJson(scenes) {
      let html = '';
      for (const scene of scenes) {
        html += `<div class="scene-heading">${scene.heading || ''}</div>`;
        for (const line of scene.lines || []) {
          if (line.type === 'action') html += `<div class="action">${line.text}</div>`;
          else if (line.type === 'character') html += `<div class="character">${line.text}</div>`;
          else if (line.type === 'dialogue') html += `<div class="dialogue">${line.text}</div>`;
          else if (line.type === 'parenthetical') html += `<div class="parenthetical">${line.text}</div>`;
        }
      }
      return html;
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.add('visible');
    }

    function hideError() {
      errorDiv.classList.remove('visible');
    }
  </script>
</body>
</html>
