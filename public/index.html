<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Forced A Bot</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --paper: #ffffff;
      --text: #000000;
      --text-light: #333333;
      --border: #000000;
      --accent: #000000;
      --error-bg: #ffeeee;
      --error-text: #cc0000;
    }
    body {
      font-family: 'Helvetica', 'Arial', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }
    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header { text-align: center; margin-bottom: 2.5rem; padding: 1rem 0; }
    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .tagline {
      color: var(--text-light);
      font-size: 0.95rem;
      font-style: italic;
    }

    /* Input Section */
    .input-section {
      background: var(--paper);
      border: 2px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .input-row {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border: 2px solid var(--text);
    }
    .input-row label {
      background: var(--text);
      color: var(--paper);
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"] {
      flex: 1;
      padding: 1rem 1.25rem;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      background: var(--paper);
      outline: none;
    }
    input[type="text"]::placeholder { color: var(--text-light); }

    button {
      width: 100%;
      padding: 1.1rem;
      background: var(--accent);
      color: var(--paper);
      border: 2px solid var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover:not(:disabled) {
      background: var(--paper);
      color: var(--text);
    }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled {
      background: #cccccc;
      color: #666666;
      border-color: #666666;
      cursor: not-allowed;
    }

    .error {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--error-bg);
      border-left: 4px solid var(--error-text);
      color: var(--error-text);
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
    }
    .error.visible { display: block; }
    .error .retry-btn {
      margin-top: 0.75rem;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      width: auto;
      display: inline-block;
      background: var(--error-text);
      color: white;
      border: none;
    }
    .error .retry-btn:hover:not(:disabled) {
      background: #aa0000;
      color: white;
    }

    /* Result - Play Script Format */
    .result {
      margin-top: 2rem;
      display: none;
      background: var(--paper);
      border: 2px solid var(--text);
    }
    .result.visible { display: block; }

    .result-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 2px solid var(--border);
      background: var(--paper);
    }
    .result-header p {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-light);
      font-style: italic;
    }

    /* Script Body - Industry Standard Formatting */
    .result-body {
      padding: 2.5rem 3rem;
      font-size: 1.3rem;
      line-height: 1.6;
      font-family: 'Courier New', Courier, monospace;
      background: var(--paper);
      min-height: 400px;
    }

    .result-body .scene-heading {
      font-weight: bold;
      text-transform: uppercase;
      margin: 1.5rem 0 1rem 0;
      text-align: left;
      font-size: 0.95rem;
    }
    .result-body .scene-heading:first-child {
      margin-top: 0;
    }

    .result-body .action {
      margin: 1rem 0;
      text-align: left;
    }

    .result-body .character {
      text-align: center;
      margin: 1.5rem 0 0.25rem 0;
      font-weight: bold;
      text-transform: uppercase;
      display: block;
      font-size: 0.95rem;
    }

    .result-body .parenthetical {
      text-align: center;
      margin: 0 20%;
      font-style: italic;
      font-size: 0.9rem;
    }

    .result-body .dialogue {
      margin: 0 15% 0.75rem 15%;
      text-align: left;
    }

    /* Footer in output */
    .result-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-light);
      font-style: italic;
    }

    /* Action Buttons */
    .result-actions {
      display: flex;
      border-top: 2px solid var(--text);
    }
    .result-actions button {
      width: auto;
      flex: 1;
      background: var(--paper);
      color: var(--text);
      border: none;
      border-right: 1px solid var(--border);
      padding: 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-actions button:last-child { border-right: none; }
    .result-actions button:hover:not(:disabled) {
      background: #f0f0f0;
    }

    /* Page Footer */
    .page-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .page-footer a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .page-footer a:hover {
      border-bottom-color: var(--text);
    }

    /* Raw output styling for fallback */
    .raw-output {
      white-space: pre-wrap;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .result-body { padding: 1.5rem 1.25rem; }
      .result-body .dialogue { margin: 0 10% 0.75rem 10%; }
      .result-body .parenthetical { margin: 0 10%; }
      h1 { font-size: 1.75rem; }
      .result-actions button { font-size: 0.7rem; padding: 0.75rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>I Forced A Bot</h1>
      <p class="tagline">to watch 1,000 hours of X and write a script</p>
    </div>

    <div class="input-section">
      <div class="input-row">
        <label>1000 hours of</label>
        <input type="text" id="content" placeholder="Olive Garden commercials, 90s sitcoms..." maxlength="500">
      </div>
      <button id="generateBtn">Start watching</button>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-header">
        <p id="memeIntroText"></p>
      </div>
      <div class="result-body" id="playScript"></div>
      <div class="result-footer" id="resultFooter">
        Inspired by Keaton Patti.
      </div>
      <div class="result-actions">
        <button id="copyBtn">Copy Text</button>
        <button id="downloadBtn">Save as Image</button>
        <button id="newBtn">New Script</button>
      </div>
    </div>

    <div class="page-footer">
      <p>inspired by <a href="https://twitter.com/keatonpatti" target="_blank">keaton patti</a> · built by <a href="https://www.tianyufang.net/" target="_blank">tianyu fang</a></p>
    </div>
  </div>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const contentInput = document.getElementById('content');
    const resultDiv = document.getElementById('result');
    const memeIntroText = document.getElementById('memeIntroText');
    const playScript = document.getElementById('playScript');
    const errorDiv = document.getElementById('error');

    let lastContent = '';
    let isGenerating = false;

    generateBtn.addEventListener('click', () => {
      if (isGenerating) return;
      generatePlay(contentInput.value.trim());
    });
    copyBtn.addEventListener('click', copyToClipboard);
    downloadBtn.addEventListener('click', downloadJPEG);
    newBtn.addEventListener('click', resetForm);

    contentInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        generatePlay(contentInput.value.trim());
      }
    });

    async function generatePlay(content) {
      if (!content) {
        showError('Enter what the bot watched');
        return;
      }

      if (isGenerating) return;

      lastContent = content;
      isGenerating = true;
      hideError();
      generateBtn.disabled = true;
      generateBtn.textContent = 'Watching...';

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || `API request failed (${response.status})`);
        }

        const data = await response.json();
        const result = data.choices?.[0]?.message?.content?.trim();

        if (!result) {
          throw new Error('No response from AI');
        }

        const parsed = parseScriptResponse(result);

        if (parsed.success) {
          memeIntroText.textContent = parsed.intro || '';
          playScript.innerHTML = parsed.html;
        } else {
          // Fallback: display raw output in a readable format
          memeIntroText.textContent = '';
          playScript.innerHTML = `<div class="raw-output">${escapeHtml(result)}</div>`;
        }

        resultDiv.classList.add('visible');
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } catch (err) {
        showError(err.message || 'Something went wrong', true);
      } finally {
        isGenerating = false;
        generateBtn.disabled = false;
        generateBtn.textContent = 'Start watching';
      }
    }

    function parseScriptResponse(text) {
      // Try multiple strategies to extract JSON
      const strategies = [
        // Strategy 1: Code block with json
        () => {
          const jsonMatch = text.match(/```json\n?([\s\S]*?)\n?```/);
          if (jsonMatch) return jsonMatch[1].trim();
          return null;
        },
        // Strategy 2: Code block without language
        () => {
          const jsonMatch = text.match(/```\n?([\s\S]*?)\n?```/);
          if (jsonMatch) return jsonMatch[1].trim();
          return null;
        },
        // Strategy 3: Find JSON between first { and last }
        () => {
          const startIdx = text.indexOf('{');
          const endIdx = text.lastIndexOf('}');
          if (startIdx !== -1 && endIdx !== -1 && startIdx < endIdx) {
            return text.substring(startIdx, endIdx + 1);
          }
          return null;
        }
      ];

      for (const strategy of strategies) {
        try {
          const jsonStr = strategy();
          if (!jsonStr) continue;

          // Clean up common JSON issues
          const cleaned = jsonStr
            .replace(/[\u2018\u2019]/g, "'")   // curly single quotes
            .replace(/[\u201C\u201D]/g, '"')   // curly double quotes
            .replace(/[\u2013\u2014]/g, '-')  // em/en dashes
            .replace(/,\s*}/g, '}')           // trailing commas
            .replace(/,\s*]/g, ']')
            .trim();

          const json = JSON.parse(cleaned);

          if (json.scenes && Array.isArray(json.scenes)) {
            return {
              success: true,
              intro: json.intro || '',
              html: renderFromJson(json.scenes)
            };
          }
        } catch (e) {
          // Continue to next strategy
        }
      }

      return { success: false };
    }

    function renderFromJson(scenes) {
      let html = '';
      for (const scene of scenes) {
        if (scene.heading) {
          html += `<div class="scene-heading">${escapeHtml(scene.heading)}</div>`;
        }
        for (const line of scene.lines || []) {
          if (!line || !line.type || !line.text) continue;
          const text = escapeHtml(line.text);
          if (line.type === 'action') html += `<div class="action">${text}</div>`;
          else if (line.type === 'character') html += `<div class="character">${text}</div>`;
          else if (line.type === 'dialogue') html += `<div class="dialogue">${text}</div>`;
          else if (line.type === 'parenthetical') html += `<div class="parenthetical">${text}</div>`;
        }
      }
      return html || '<div class="action">(No script content)</div>';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyToClipboard() {
      const footerText = document.getElementById('resultFooter').textContent;

      // Build formatted text preserving screenplay structure
      let scriptText = '';
      const scenes = playScript.querySelectorAll('.scene-heading, .action, .character, .dialogue, .parenthetical');

      for (const el of scenes) {
        const text = el.textContent.trim();
        if (!text) continue;

        if (el.classList.contains('scene-heading')) {
          scriptText += `${text.toUpperCase()}\n\n`;
        } else if (el.classList.contains('action')) {
          scriptText += `${text}\n\n`;
        } else if (el.classList.contains('character')) {
          scriptText += `           ${text.toUpperCase()}\n`;
        } else if (el.classList.contains('parenthetical')) {
          scriptText += `              (${text})\n`;
        } else if (el.classList.contains('dialogue')) {
          scriptText += `    ${text}\n\n`;
        }
      }

      // Fallback to textContent if no structured elements found
      const text = memeIntroText.textContent
        ? `${memeIntroText.textContent}\n\n${scriptText || playScript.textContent}\n\n${footerText}`
        : `${scriptText || playScript.textContent}\n\n${footerText}`;

      navigator.clipboard.writeText(text.trim()).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Text', 2000);
      }).catch(() => {
        showError('Failed to copy to clipboard');
      });
    }

    async function downloadJPEG() {
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Saving...';
      try {
        // Set fixed dimensions for consistent output
        const canvas = await html2canvas(resultDiv, {
          backgroundColor: '#ffffff',
          scale: 2,
          width: resultDiv.offsetWidth,
          height: resultDiv.offsetHeight,
          useCORS: true,
          allowTaint: true
        });
        const link = document.createElement('a');
        const timestamp = new Date().toISOString().slice(0, 10);
        link.download = `forced-bot-${timestamp}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
        downloadBtn.textContent = 'Saved!';
        setTimeout(() => downloadBtn.textContent = 'Save as Image', 2000);
      } catch (err) {
        showError('Failed to generate image');
        console.error('Image generation error:', err);
      } finally {
        downloadBtn.disabled = false;
      }
    }

    function resetForm() {
      resultDiv.classList.remove('visible');
      hideError();
      // Don't clear input - user might want to regenerate
      contentInput.focus();
    }

    function showError(msg, showRetry = false) {
      let html = escapeHtml(msg);
      if (showRetry && lastContent) {
        html += `<br><button class="retry-btn" onclick="retryGenerate()">Try Again</button>`;
      }
      errorDiv.innerHTML = html;
      errorDiv.classList.add('visible');
    }

    function hideError() {
      errorDiv.classList.remove('visible');
      errorDiv.textContent = '';
    }

    // Global function for inline onclick
    window.retryGenerate = function() {
      if (lastContent) {
        hideError();
        generatePlay(lastContent);
      }
    };
  </script>
</body>
</html>
